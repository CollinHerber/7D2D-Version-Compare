name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILD_CONFIGURATION: Release

jobs:
  windows:
    name: Windows Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute release plan
        id: plan
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File eng/Get-ReleasePlan.ps1

      - name: Skip release
        if: steps.plan.outputs.should_release != 'true'
        shell: pwsh
        run: Write-Host "No feat or fix commits since the latest version tag. Chore commits do not create a release."

      - name: Setup .NET
        if: steps.plan.outputs.should_release == 'true'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        run: dotnet restore VersionCompareTool.slnx -p:Configuration=${{ env.BUILD_CONFIGURATION }}

      - name: Test
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        run: dotnet test VersionCompareTool.slnx --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Publish Windows build
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        run: >
          dotnet publish src/VersionCompareTool/VersionCompareTool.csproj
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --runtime win-x64
          --self-contained true
          --no-restore
          -p:Optimize=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.plan.outputs.version }}
          -o artifacts/publish/win-x64

      - name: Add data folder placeholders
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        run: |
          Get-ChildItem -Path artifacts/publish/win-x64 -Filter *.pdb -Recurse | Remove-Item -Force
          New-Item -ItemType Directory -Force -Path artifacts/publish/win-x64/Versions | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/publish/win-x64/Mods | Out-Null
          Set-Content -Path artifacts/publish/win-x64/Versions/README.txt -Value "Create one folder per 7D2D version here, for example: 2.6 or 3.0."
          Set-Content -Path artifacts/publish/win-x64/Mods/README.txt -Value "Create one folder per mod here. Mod comparison is off until a mod is selected."

      - name: Validate Release artifact
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $publishPath = "artifacts/publish/win-x64"
          $pdbFiles = @(Get-ChildItem -Path $publishPath -Filter *.pdb -Recurse)
          if ($pdbFiles.Count -gt 0) {
            $paths = $pdbFiles | ForEach-Object { $_.FullName }
            throw "Release artifact contains debug symbols: $($paths -join ', ')"
          }

          $diagnosticsFiles = @(
            Get-ChildItem -Path $publishPath -File -Recurse |
              Where-Object {
                $_.Name -like "Avalonia.Diagnostics*" -or
                $_.Name -like "AvaloniaUI.DiagnosticsSupport*"
              }
          )
          if ($diagnosticsFiles.Count -gt 0) {
            $paths = $diagnosticsFiles | ForEach-Object { $_.FullName }
            throw "Release artifact contains Avalonia diagnostics files: $($paths -join ', ')"
          }

          $assetsPath = "src/VersionCompareTool/obj/project.assets.json"
          if ((Test-Path $assetsPath) -and (Select-String -Path $assetsPath -Pattern "AvaloniaUI.DiagnosticsSupport" -SimpleMatch -Quiet)) {
            throw "Release restore includes AvaloniaUI.DiagnosticsSupport."
          }

          function Test-FileContainsAsciiText {
            param(
              [string]$Path,
              [string]$Text
            )

            $bytes = [System.IO.File]::ReadAllBytes($Path)
            $needle = [System.Text.Encoding]::ASCII.GetBytes($Text)
            for ($i = 0; $i -le $bytes.Length - $needle.Length; $i++) {
              $found = $true
              for ($j = 0; $j -lt $needle.Length; $j++) {
                if ($bytes[$i + $j] -ne $needle[$j]) {
                  $found = $false
                  break
                }
              }

              if ($found) {
                return $true
              }
            }

            return $false
          }

          $appExe = Join-Path $publishPath "VersionCompareTool.exe"
          if (-not (Test-Path $appExe)) {
            throw "Release artifact is missing VersionCompareTool.exe."
          }

          $rootDllFiles = @(Get-ChildItem -Path $publishPath -Filter *.dll -File)
          if ($rootDllFiles.Count -gt 0) {
            $paths = $rootDllFiles | ForEach-Object { $_.FullName }
            throw "Release artifact contains root dependency DLLs instead of a bundled single-file executable: $($paths -join ', ')"
          }

          if (Test-FileContainsAsciiText -Path $appExe -Text "WithDeveloperTools") {
            throw "Release executable contains Avalonia developer tools."
          }

      - name: Package Windows build
        if: steps.plan.outputs.should_release == 'true'
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.plan.outputs.version }}"
          $zipPath = "artifacts/7D2D-Version-Compare-v$version-win-x64.zip"
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath $zipPath -Force
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Prepare Nexus Mods metadata
        if: steps.plan.outputs.should_release == 'true'
        id: nexus_metadata
        shell: pwsh
        run: |
          $notesPath = "${{ steps.plan.outputs.notes_path }}"
          $description = if (Test-Path $notesPath) {
            Get-Content -Path $notesPath -Raw
          }
          else {
            "Release ${{ steps.plan.outputs.tag }}"
          }

          $delimiter = [guid]::NewGuid().ToString()
          "description<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $description | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate Nexus Mods API key
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        env:
          NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NEXUSMODS_API_KEY)) {
            throw "Missing NEXUSMODS_API_KEY repository secret."
          }

      - name: Create tag
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $tag = "${{ steps.plan.outputs.tag }}"
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if (-not [string]::IsNullOrWhiteSpace($remoteTag)) {
            Write-Host "Tag $tag already exists on origin."
          }
          else {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            $localTag = git tag --list $tag
            if ([string]::IsNullOrWhiteSpace($localTag)) {
              git tag $tag
            }
            git push origin "refs/tags/$tag"
          }

      - name: Create GitHub release
        if: steps.plan.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.plan.outputs.tag }}"
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $notesPath = "${{ steps.plan.outputs.notes_path }}"

          if (gh release view $tag 2>$null) {
            gh release upload $tag $zipPath --clobber
          }
          else {
            gh release create $tag $zipPath --title $tag --notes-file $notesPath
          }

      - name: Upload release to Nexus Mods
        if: steps.plan.outputs.should_release == 'true'
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: '7557689'
          filename: ${{ steps.package.outputs.zip_path }}
          version: ${{ steps.plan.outputs.version }}
          display_name: 7D2D Version Compare v${{ steps.plan.outputs.version }}
          description: ${{ steps.nexus_metadata.outputs.description }}
          category: main
